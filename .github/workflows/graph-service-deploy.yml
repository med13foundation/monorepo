          REGION: ${{ env.REGION }}
          GRAPH_SERVICE: med13-graph-api-staging
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_STAGING }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_STAGING }}
          GRAPH_DATABASE_URL_SECRET_NAME: ${{ vars.GRAPH_DATABASE_URL_SECRET_NAME_STAGING }}
          GRAPH_JWT_SECRET_NAME: ${{ vars.GRAPH_JWT_SECRET_NAME_STAGING }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_STAGING }}
          GRAPH_MIN_INSTANCES: ${{ vars.GRAPH_MIN_INSTANCES_STAGING }}
          GRAPH_PUBLIC: ${{ vars.GRAPH_PUBLIC_STAGING }}
          GRAPH_SERVICE_NAME: MED13 Graph Service (Staging)
          GRAPH_DB_POOL_SIZE: ${{ vars.GRAPH_DB_POOL_SIZE_STAGING }}
          GRAPH_DB_MAX_OVERFLOW: ${{ vars.GRAPH_DB_MAX_OVERFLOW_STAGING }}
          GRAPH_DB_POOL_TIMEOUT_SECONDS: ${{ vars.GRAPH_DB_POOL_TIMEOUT_SECONDS_STAGING }}
          GRAPH_DB_POOL_RECYCLE_SECONDS: ${{ vars.GRAPH_DB_POOL_RECYCLE_SECONDS_STAGING }}
          GRAPH_DB_POOL_USE_LIFO: ${{ vars.GRAPH_DB_POOL_USE_LIFO_STAGING }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_STAGING }}
          MED13_ENABLE_GRAPH_SEARCH_AGENT: ${{ vars.MED13_ENABLE_GRAPH_SEARCH_AGENT_STAGING }}
          MED13_ENABLE_RELATION_SUGGESTIONS: ${{ vars.MED13_ENABLE_RELATION_SUGGESTIONS_STAGING }}
          MED13_ENABLE_HYPOTHESIS_GENERATION: ${{ vars.MED13_ENABLE_HYPOTHESIS_GENERATION_STAGING }}
          MED13_ARTANA_POOL_MIN_SIZE: ${{ vars.MED13_ARTANA_POOL_MIN_SIZE_STAGING }}
          MED13_ARTANA_POOL_MAX_SIZE: ${{ vars.MED13_ARTANA_POOL_MAX_SIZE_STAGING }}
          MED13_ARTANA_COMMAND_TIMEOUT_SECONDS: ${{ vars.MED13_ARTANA_COMMAND_TIMEOUT_SECONDS_STAGING }}
        run: bash scripts/deploy/sync_graph_cloud_run_runtime_config.sh

      - name: Validate shared-instance graph topology (Staging)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          GRAPH_SERVICE: med13-graph-api-staging
          API_SERVICE: med13-resource-library-staging
          ADMIN_SERVICE: med13-admin-staging
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_STAGING }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_STAGING }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_STAGING }}
        run: |
