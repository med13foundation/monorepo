name: Deploy to Cloud Run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Optional deployment target for manual runs"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - dev
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  test:
    name: Test & Container Gate
    runs-on: ubuntu-latest
    env:
      COVERAGE_XML_PATH: ${{ github.workspace }}/coverage.xml
      PIP_AUDIT_RESULTS_PATH: ${{ github.workspace }}/pip-audit-results.json
    steps:
      - uses: actions/checkout@v4

      - name: Compute deploy image refs
        id: image_refs
        shell: bash
        env:
          API_PUBLIC_URL_DEV: ${{ vars.API_PUBLIC_URL_DEV }}
          API_PUBLIC_URL_STAGING: ${{ vars.API_PUBLIC_URL_STAGING }}
          API_PUBLIC_URL_PROD: ${{ vars.API_PUBLIC_URL_PROD }}
          API_PUBLIC_WS_URL_DEV: ${{ vars.API_PUBLIC_WS_URL_DEV }}
          API_PUBLIC_WS_URL_STAGING: ${{ vars.API_PUBLIC_WS_URL_STAGING }}
          API_PUBLIC_WS_URL_PROD: ${{ vars.API_PUBLIC_WS_URL_PROD }}
          GRAPH_PUBLIC_URL_DEV: ${{ vars.GRAPH_PUBLIC_URL_DEV }}
          GRAPH_PUBLIC_URL_STAGING: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          GRAPH_PUBLIC_URL_PROD: ${{ vars.GRAPH_PUBLIC_URL_PROD }}
        run: |
          target_env="none"
          dispatch_env="${{ github.event.inputs.environment }}"
          event_action="${{ github.event.action }}"
          admin_public_api_url="http://localhost:8080"
          admin_public_ws_url="ws://localhost:8080"
          admin_public_graph_api_url="http://localhost:8090"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            target_env="staging"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            target_env="dev"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" && "${event_action}" == "published" ]]; then
            target_env="prod"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${dispatch_env}" != "none" ]]; then
            target_env="${dispatch_env}"
          fi

          api_image=""
          admin_image=""
          case "${target_env}" in
            dev)
              api_repo="med13-resource-library-dev"
              admin_repo="med13-admin-dev"
              admin_public_api_url="${API_PUBLIC_URL_DEV:-$admin_public_api_url}"
              admin_public_ws_url="${API_PUBLIC_WS_URL_DEV:-$admin_public_ws_url}"
              admin_public_graph_api_url="${GRAPH_PUBLIC_URL_DEV:-$admin_public_graph_api_url}"
              ;;
            staging)
              api_repo="med13-resource-library-staging"
              admin_repo="med13-admin-staging"
              admin_public_api_url="${API_PUBLIC_URL_STAGING:-$admin_public_api_url}"
              admin_public_ws_url="${API_PUBLIC_WS_URL_STAGING:-$admin_public_ws_url}"
              admin_public_graph_api_url="${GRAPH_PUBLIC_URL_STAGING:-$admin_public_graph_api_url}"
              ;;
            prod)
              api_repo="med13-resource-library"
              admin_repo="med13-admin"
              admin_public_api_url="${API_PUBLIC_URL_PROD:-$admin_public_api_url}"
              admin_public_ws_url="${API_PUBLIC_WS_URL_PROD:-$admin_public_ws_url}"
              admin_public_graph_api_url="${GRAPH_PUBLIC_URL_PROD:-$admin_public_graph_api_url}"
              ;;
            *)
              target_env="none"
              ;;
          esac

          if [[ "${target_env}" != "none" && -n "${PROJECT_ID}" ]]; then
            api_image="${REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${api_repo}:${GITHUB_SHA}"
            admin_image="${REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${admin_repo}:${GITHUB_SHA}"
          fi

          echo "target_env=${target_env}" >> "${GITHUB_OUTPUT}"
          echo "api_image=${api_image}" >> "${GITHUB_OUTPUT}"
          echo "admin_image=${admin_image}" >> "${GITHUB_OUTPUT}"
          echo "admin_public_api_url=${admin_public_api_url}" >> "${GITHUB_OUTPUT}"
          echo "admin_public_ws_url=${admin_public_ws_url}" >> "${GITHUB_OUTPUT}"
          echo "admin_public_graph_api_url=${admin_public_graph_api_url}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install web dependencies
        working-directory: src/web
        run: npm ci

      - name: Lint & Type-check Web
        working-directory: src/web
        run: |
          npm run lint
          npm run type-check

      - name: Test Web
        working-directory: src/web
        run: npm run test -- --runInBand --ci

      - name: Audit Web
        working-directory: src/web
        run: npm audit --omit=dev --audit-level=moderate

      - name: Python Quality Gate (Lint & Type)
        run: |
          ruff check src/ tests/
          mypy src/ --install-types --non-interactive

      - name: Security Audit (Bandit)
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-results.json

      - name: Upload Bandit Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

      - name: Dependency Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --format json --output "${PIP_AUDIT_RESULTS_PATH}"
          test -s "${PIP_AUDIT_RESULTS_PATH}"

      - name: Upload Audit Results
        if: always() && hashFiles('pip-audit-results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: ${{ env.PIP_AUDIT_RESULTS_PATH }}

      - name: Validate Architecture & Dependencies
        run: |
          python scripts/validate_architecture.py
          python scripts/validate_dependencies.py
          pytest -m architecture -v

      - name: Backend Tests with Coverage
        run: |
          pytest --cov=src --cov-report=xml:"${COVERAGE_XML_PATH}"
          test -s "${COVERAGE_XML_PATH}"

      - name: Upload coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ${{ env.COVERAGE_XML_PATH }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: med13-resource-library:test
          cache-from: type=gha,scope=api-test
          cache-to: type=gha,mode=max,scope=api-test

      - name: Build Admin image
        uses: docker/build-push-action@v5
        with:
          context: ./src/web
          file: ./src/web/Dockerfile
          load: true
          tags: med13-admin:test
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.image_refs.outputs.admin_public_api_url }}
            NEXT_PUBLIC_WS_URL=${{ steps.image_refs.outputs.admin_public_ws_url }}
            NEXT_PUBLIC_GRAPH_API_URL=${{ steps.image_refs.outputs.admin_public_graph_api_url }}
          cache-from: type=gha,scope=admin-test
          cache-to: type=gha,mode=max,scope=admin-test

      - name: Container Scan API (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: med13-resource-library:test
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Container Scan Admin (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: med13-admin:test
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Validate Google Cloud image publish config
        if: steps.image_refs.outputs.target_env != 'none'
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions image publish configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud (Image Publish)
        if: steps.image_refs.outputs.target_env != 'none'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI (Image Publish)
        if: steps.image_refs.outputs.target_env != 'none'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry (Image Publish)
        if: steps.image_refs.outputs.target_env != 'none'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Push API image
        if: steps.image_refs.outputs.api_image != ''
        run: |
          docker tag med13-resource-library:test "${{ steps.image_refs.outputs.api_image }}"
          docker push "${{ steps.image_refs.outputs.api_image }}"

      - name: Push Admin image
        if: steps.image_refs.outputs.admin_image != ''
        run: |
          docker tag med13-admin:test "${{ steps.image_refs.outputs.admin_image }}"
          docker push "${{ steps.image_refs.outputs.admin_image }}"

  graph-invariants:
    name: Graph Invariant Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: med13_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d med13_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/med13_ci
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/med13_ci
      MED13_ENABLE_DISTRIBUTED_RATE_LIMIT: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run graph invariant suite
        run: |
          python scripts/run_isolated_postgres_tests.py \
            tests/unit/application/services/test_kernel_relation_projection_materialization_service.py \
            tests/unit/application/services/test_kernel_relation_projection_invariant_service.py \
            tests/unit/application/services/test_kernel_claim_projection_readiness_service.py \
            tests/unit/application/services/test_check_claim_projection_readiness_script.py \
            tests/unit/application/services/test_rebuild_reasoning_paths_script.py \
            tests/unit/application/services/test_kernel_reasoning_path_service.py \
            tests/unit/application/services/test_hypothesis_generation_service.py \
            tests/unit/infrastructure/test_graph_query_repository.py \
            tests/integration/api/test_hypothesis_routes_api.py \
            tests/integration/api/test_kernel_graph_view_api.py \
            tests/integration/api/test_kernel_reasoning_path_api.py \
            tests/integration/api/test_kernel_routes_api.py \
            tests/integration/kernel/test_graph_dictionary_hard_guarantees.py \
            -m "graph and not performance"

      - name: Run graph performance suite
        run: |
          python scripts/run_isolated_postgres_tests.py \
            tests/performance/test_graph_query_performance.py \
            -m "graph and performance"

  deploy-dev:
    name: Deploy to Dev
    needs: [test, graph-invariants]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate prebuilt image refs (Dev)
        env:
          API_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-resource-library-dev:${{ github.sha }}
          ADMIN_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-admin-dev:${{ github.sha }}
        run: |
          [ -n "${API_IMAGE}" ] || { echo "Missing API image ref from test job" >&2; exit 1; }
          [ -n "${ADMIN_IMAGE}" ] || { echo "Missing Admin image ref from test job" >&2; exit 1; }

      - name: Deploy API to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-resource-library-dev
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-resource-library-dev:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Deploy Admin to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-admin-dev
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-admin-dev:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Cloud Run Runtime Config (Dev)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          API_SERVICE: med13-resource-library-dev
          ADMIN_SERVICE: med13-admin-dev
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_DEV }}
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_DEV }}
          MED13_DEV_JWT_SECRET_NAME: ${{ vars.MED13_DEV_JWT_SECRET_NAME_DEV }}
          ADMIN_API_KEY_SECRET_NAME: ${{ vars.ADMIN_API_KEY_SECRET_NAME_DEV }}
          WRITE_API_KEY_SECRET_NAME: ${{ vars.WRITE_API_KEY_SECRET_NAME_DEV }}
          READ_API_KEY_SECRET_NAME: ${{ vars.READ_API_KEY_SECRET_NAME_DEV }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_DEV }}
          MED13_ALLOWED_ORIGINS: ${{ vars.MED13_ALLOWED_ORIGINS_DEV }}
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_DEV }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_DEV }}
          MED13_DB_POOL_SIZE: ${{ vars.MED13_DB_POOL_SIZE_DEV }}
          MED13_DB_MAX_OVERFLOW: ${{ vars.MED13_DB_MAX_OVERFLOW_DEV }}
          MED13_DB_POOL_TIMEOUT_SECONDS: ${{ vars.MED13_DB_POOL_TIMEOUT_SECONDS_DEV }}
          MED13_DB_POOL_RECYCLE_SECONDS: ${{ vars.MED13_DB_POOL_RECYCLE_SECONDS_DEV }}
          MED13_DB_POOL_USE_LIFO: ${{ vars.MED13_DB_POOL_USE_LIFO_DEV }}
          API_MIN_INSTANCES: ${{ vars.API_MIN_INSTANCES_DEV }}
          ADMIN_MIN_INSTANCES: ${{ vars.ADMIN_MIN_INSTANCES_DEV }}
          NEXTAUTH_SECRET_SECRET_NAME: ${{ vars.NEXTAUTH_SECRET_SECRET_NAME_DEV }}
          API_PUBLIC: ${{ vars.API_PUBLIC_DEV }}
          ADMIN_PUBLIC: ${{ vars.ADMIN_PUBLIC_DEV }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL_DEV }}
          API_PUBLIC_WS_URL: ${{ vars.API_PUBLIC_WS_URL_DEV }}
          ADMIN_PUBLIC_URL: ${{ vars.ADMIN_PUBLIC_URL_DEV }}
          MIGRATION_JOB_NAME: ${{ vars.MIGRATION_JOB_NAME_DEV }}
          SYNC_ADMIN_URLS: ${{ vars.SYNC_ADMIN_URLS_DEV }}
          SYNC_ADMIN_GRAPH_URLS: true
        run: bash scripts/deploy/sync_cloud_run_runtime_config.sh

      - name: Validate shared-instance graph topology (Dev)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          GRAPH_SERVICE: med13-graph-api-dev
          API_SERVICE: med13-resource-library-dev
          ADMIN_SERVICE: med13-admin-dev
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_DEV }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_DEV }}
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_DEV }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_DEV }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_DEV }}
        run: |
          validation_log="$(mktemp)"
          python3 scripts/deploy/validate_shared_instance_graph_topology.py | tee "${validation_log}"
          {
            echo "## Shared-instance topology validation (Dev)"
            echo
            echo '```text'
            cat "${validation_log}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-staging:
    name: Deploy to Staging
    needs: [test, graph-invariants]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate prebuilt image refs (Staging)
        env:
          API_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-resource-library-staging:${{ github.sha }}
          ADMIN_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-admin-staging:${{ github.sha }}
        run: |
          [ -n "${API_IMAGE}" ] || { echo "Missing API image ref from test job" >&2; exit 1; }
          [ -n "${ADMIN_IMAGE}" ] || { echo "Missing Admin image ref from test job" >&2; exit 1; }

      - name: Deploy API to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-resource-library-staging
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-resource-library-staging:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Deploy Admin to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-admin-staging
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-admin-staging:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Cloud Run Runtime Config (Staging)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          API_SERVICE: med13-resource-library-staging
          ADMIN_SERVICE: med13-admin-staging
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_STAGING }}
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_STAGING }}
          MED13_DEV_JWT_SECRET_NAME: ${{ vars.MED13_DEV_JWT_SECRET_NAME_STAGING }}
          ADMIN_API_KEY_SECRET_NAME: ${{ vars.ADMIN_API_KEY_SECRET_NAME_STAGING }}
          WRITE_API_KEY_SECRET_NAME: ${{ vars.WRITE_API_KEY_SECRET_NAME_STAGING }}
          READ_API_KEY_SECRET_NAME: ${{ vars.READ_API_KEY_SECRET_NAME_STAGING }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_STAGING }}
          MED13_ALLOWED_ORIGINS: ${{ vars.MED13_ALLOWED_ORIGINS_STAGING }}
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          MED13_DB_POOL_SIZE: ${{ vars.MED13_DB_POOL_SIZE_STAGING }}
          MED13_DB_MAX_OVERFLOW: ${{ vars.MED13_DB_MAX_OVERFLOW_STAGING }}
          MED13_DB_POOL_TIMEOUT_SECONDS: ${{ vars.MED13_DB_POOL_TIMEOUT_SECONDS_STAGING }}
          MED13_DB_POOL_RECYCLE_SECONDS: ${{ vars.MED13_DB_POOL_RECYCLE_SECONDS_STAGING }}
          MED13_DB_POOL_USE_LIFO: ${{ vars.MED13_DB_POOL_USE_LIFO_STAGING }}
          API_MIN_INSTANCES: 1
          ADMIN_MIN_INSTANCES: 1
          NEXTAUTH_SECRET_SECRET_NAME: ${{ vars.NEXTAUTH_SECRET_SECRET_NAME_STAGING }}
          API_PUBLIC: ${{ vars.API_PUBLIC_STAGING }}
          ADMIN_PUBLIC: ${{ vars.ADMIN_PUBLIC_STAGING }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL_STAGING }}
          API_PUBLIC_WS_URL: ${{ vars.API_PUBLIC_WS_URL_STAGING }}
          ADMIN_PUBLIC_URL: ${{ vars.ADMIN_PUBLIC_URL_STAGING }}
          MIGRATION_JOB_NAME: ${{ vars.MIGRATION_JOB_NAME_STAGING }}
          SYNC_ADMIN_URLS: ${{ vars.SYNC_ADMIN_URLS_STAGING }}
          SYNC_ADMIN_GRAPH_URLS: true
        run: bash scripts/deploy/sync_cloud_run_runtime_config.sh

      - name: Validate shared-instance graph topology (Staging)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          GRAPH_SERVICE: med13-graph-api-staging
          API_SERVICE: med13-resource-library-staging
          ADMIN_SERVICE: med13-admin-staging
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_STAGING }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_STAGING }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_STAGING }}
        run: |
          validation_log="$(mktemp)"
          python3 scripts/deploy/validate_shared_instance_graph_topology.py | tee "${validation_log}"
          {
            echo "## Shared-instance topology validation (Staging)"
            echo
            echo '```text'
            cat "${validation_log}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-production:
    name: Deploy to Production
    needs: [test, graph-invariants]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate prebuilt image refs (Production)
        env:
          API_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-resource-library:${{ github.sha }}
          ADMIN_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-admin:${{ github.sha }}
        run: |
          [ -n "${API_IMAGE}" ] || { echo "Missing API image ref from test job" >&2; exit 1; }
          [ -n "${ADMIN_IMAGE}" ] || { echo "Missing Admin image ref from test job" >&2; exit 1; }

      - name: Deploy API to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-resource-library
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-resource-library:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Deploy Admin to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-admin
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-admin:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Cloud Run Runtime Config (Production)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          API_SERVICE: med13-resource-library
          ADMIN_SERVICE: med13-admin
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_PROD }}
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_PROD }}
          MED13_DEV_JWT_SECRET_NAME: ${{ vars.MED13_DEV_JWT_SECRET_NAME_PROD }}
          ADMIN_API_KEY_SECRET_NAME: ${{ vars.ADMIN_API_KEY_SECRET_NAME_PROD }}
          WRITE_API_KEY_SECRET_NAME: ${{ vars.WRITE_API_KEY_SECRET_NAME_PROD }}
          READ_API_KEY_SECRET_NAME: ${{ vars.READ_API_KEY_SECRET_NAME_PROD }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_PROD }}
          MED13_ALLOWED_ORIGINS: ${{ vars.MED13_ALLOWED_ORIGINS_PROD }}
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_PROD }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_PROD }}
          MED13_DB_POOL_SIZE: ${{ vars.MED13_DB_POOL_SIZE_PROD }}
          MED13_DB_MAX_OVERFLOW: ${{ vars.MED13_DB_MAX_OVERFLOW_PROD }}
          MED13_DB_POOL_TIMEOUT_SECONDS: ${{ vars.MED13_DB_POOL_TIMEOUT_SECONDS_PROD }}
          MED13_DB_POOL_RECYCLE_SECONDS: ${{ vars.MED13_DB_POOL_RECYCLE_SECONDS_PROD }}
          MED13_DB_POOL_USE_LIFO: ${{ vars.MED13_DB_POOL_USE_LIFO_PROD }}
          API_MIN_INSTANCES: ${{ vars.API_MIN_INSTANCES_PROD }}
          ADMIN_MIN_INSTANCES: ${{ vars.ADMIN_MIN_INSTANCES_PROD }}
          NEXTAUTH_SECRET_SECRET_NAME: ${{ vars.NEXTAUTH_SECRET_SECRET_NAME_PROD }}
          API_PUBLIC: ${{ vars.API_PUBLIC_PROD }}
          ADMIN_PUBLIC: ${{ vars.ADMIN_PUBLIC_PROD }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL_PROD }}
          API_PUBLIC_WS_URL: ${{ vars.API_PUBLIC_WS_URL_PROD }}
          ADMIN_PUBLIC_URL: ${{ vars.ADMIN_PUBLIC_URL_PROD }}
          MIGRATION_JOB_NAME: ${{ vars.MIGRATION_JOB_NAME_PROD }}
          SYNC_ADMIN_URLS: ${{ vars.SYNC_ADMIN_URLS_PROD }}
          SYNC_ADMIN_GRAPH_URLS: true
        run: bash scripts/deploy/sync_cloud_run_runtime_config.sh

      - name: Validate shared-instance graph topology (Production)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          GRAPH_SERVICE: med13-graph-api
          API_SERVICE: med13-resource-library
          ADMIN_SERVICE: med13-admin
          GRAPH_SERVICE_URL: ${{ vars.GRAPH_PUBLIC_URL_PROD }}
          GRAPH_PUBLIC_URL: ${{ vars.GRAPH_PUBLIC_URL_PROD }}
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_PROD }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_PROD }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_PROD }}
        run: |
          validation_log="$(mktemp)"
          python3 scripts/deploy/validate_shared_instance_graph_topology.py | tee "${validation_log}"
          {
            echo "## Shared-instance topology validation (Production)"
            echo
            echo '```text'
            cat "${validation_log}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
