name: Deploy to Cloud Run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Optional deployment target for manual runs"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - dev
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  test:
    name: Test & Container Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install web dependencies
        working-directory: src/web
        run: npm ci

      - name: Lint & Type-check Web
        working-directory: src/web
        run: |
          npm run lint
          npm run type-check

      - name: Test Web
        working-directory: src/web
        run: npm run test -- --runInBand --ci

      - name: Audit Web
        working-directory: src/web
        run: npm audit --omit=dev --audit-level=moderate

      - name: Python Quality Gate (Lint & Type)
        run: |
          ruff check src/ tests/
          mypy src/ --install-types --non-interactive

      - name: Security Audit (Bandit)
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-results.json

      - name: Upload Bandit Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

      - name: Dependency Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --format json | tee pip-audit-results.json

      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json

      - name: Validate Architecture & Dependencies
        run: |
          python scripts/validate_architecture.py
          python scripts/validate_dependencies.py
          pytest -m architecture -v

      - name: Backend Tests with Coverage
        run: pytest --cov=src --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: med13-resource-library:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin image
        uses: docker/build-push-action@v5
        with:
          context: ./src/web
          file: ./src/web/Dockerfile
          load: true
          tags: med13-admin:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container Scan API (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: med13-resource-library:test
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Container Scan Admin (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: med13-admin:test
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

  deploy-dev:
    name: Deploy to Dev
    needs: test
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEV }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-resource-library-dev
          source: .
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Deploy Admin to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-admin-dev
          source: src/web
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Cloud Run Runtime Config (Dev)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          API_SERVICE: med13-resource-library-dev
          ADMIN_SERVICE: med13-admin-dev
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_DEV }}
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_DEV }}
          MED13_DEV_JWT_SECRET_NAME: ${{ vars.MED13_DEV_JWT_SECRET_NAME_DEV }}
          ADMIN_API_KEY_SECRET_NAME: ${{ vars.ADMIN_API_KEY_SECRET_NAME_DEV }}
          WRITE_API_KEY_SECRET_NAME: ${{ vars.WRITE_API_KEY_SECRET_NAME_DEV }}
          READ_API_KEY_SECRET_NAME: ${{ vars.READ_API_KEY_SECRET_NAME_DEV }}
          MED13_ALLOWED_ORIGINS: ${{ vars.MED13_ALLOWED_ORIGINS_DEV }}
          NEXTAUTH_SECRET_SECRET_NAME: ${{ vars.NEXTAUTH_SECRET_SECRET_NAME_DEV }}
          API_PUBLIC: ${{ vars.API_PUBLIC_DEV }}
          ADMIN_PUBLIC: ${{ vars.ADMIN_PUBLIC_DEV }}
          MIGRATION_JOB_NAME: ${{ vars.MIGRATION_JOB_NAME_DEV }}
          SYNC_ADMIN_URLS: ${{ vars.SYNC_ADMIN_URLS_DEV }}
        run: bash scripts/deploy/sync_cloud_run_runtime_config.sh

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-resource-library-staging
          source: .
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Deploy Admin to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-admin-staging
          source: src/web
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Cloud Run Runtime Config (Staging)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          API_SERVICE: med13-resource-library-staging
          ADMIN_SERVICE: med13-admin-staging
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_STAGING }}
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_STAGING }}
          MED13_DEV_JWT_SECRET_NAME: ${{ vars.MED13_DEV_JWT_SECRET_NAME_STAGING }}
          ADMIN_API_KEY_SECRET_NAME: ${{ vars.ADMIN_API_KEY_SECRET_NAME_STAGING }}
          WRITE_API_KEY_SECRET_NAME: ${{ vars.WRITE_API_KEY_SECRET_NAME_STAGING }}
          READ_API_KEY_SECRET_NAME: ${{ vars.READ_API_KEY_SECRET_NAME_STAGING }}
          MED13_ALLOWED_ORIGINS: ${{ vars.MED13_ALLOWED_ORIGINS_STAGING }}
          NEXTAUTH_SECRET_SECRET_NAME: ${{ vars.NEXTAUTH_SECRET_SECRET_NAME_STAGING }}
          API_PUBLIC: ${{ vars.API_PUBLIC_STAGING }}
          ADMIN_PUBLIC: ${{ vars.ADMIN_PUBLIC_STAGING }}
          MIGRATION_JOB_NAME: ${{ vars.MIGRATION_JOB_NAME_STAGING }}
          SYNC_ADMIN_URLS: ${{ vars.SYNC_ADMIN_URLS_STAGING }}
        run: bash scripts/deploy/sync_cloud_run_runtime_config.sh

  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-resource-library
          source: .
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Deploy Admin to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-admin
          source: src/web
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Cloud Run Runtime Config (Production)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          API_SERVICE: med13-resource-library
          ADMIN_SERVICE: med13-admin
          CLOUDSQL_CONNECTION_NAME: ${{ vars.CLOUDSQL_CONNECTION_NAME_PROD }}
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_PROD }}
          MED13_DEV_JWT_SECRET_NAME: ${{ vars.MED13_DEV_JWT_SECRET_NAME_PROD }}
          ADMIN_API_KEY_SECRET_NAME: ${{ vars.ADMIN_API_KEY_SECRET_NAME_PROD }}
          WRITE_API_KEY_SECRET_NAME: ${{ vars.WRITE_API_KEY_SECRET_NAME_PROD }}
          READ_API_KEY_SECRET_NAME: ${{ vars.READ_API_KEY_SECRET_NAME_PROD }}
          MED13_ALLOWED_ORIGINS: ${{ vars.MED13_ALLOWED_ORIGINS_PROD }}
          NEXTAUTH_SECRET_SECRET_NAME: ${{ vars.NEXTAUTH_SECRET_SECRET_NAME_PROD }}
          API_PUBLIC: ${{ vars.API_PUBLIC_PROD }}
          ADMIN_PUBLIC: ${{ vars.ADMIN_PUBLIC_PROD }}
          MIGRATION_JOB_NAME: ${{ vars.MIGRATION_JOB_NAME_PROD }}
          SYNC_ADMIN_URLS: ${{ vars.SYNC_ADMIN_URLS_PROD }}
        run: bash scripts/deploy/sync_cloud_run_runtime_config.sh
