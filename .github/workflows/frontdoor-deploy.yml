name: Front Door Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/frontdoor/**'
      - '.github/workflows/frontdoor-deploy.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/frontdoor/**'
      - '.github/workflows/frontdoor-deploy.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Optional deployment target for manual runs'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - dev
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
  NODE_VERSION: '20'

permissions:
  contents: read
  id-token: write

jobs:
  frontdoor-checks:
    name: Frontdoor Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/frontdoor/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontdoor
        run: npm ci

      - name: Lint
        working-directory: apps/frontdoor
        run: npm run lint

      - name: Type-check
        working-directory: apps/frontdoor
        run: npm run type-check

      - name: Unit tests
        working-directory: apps/frontdoor
        run: npm run test -- --ci

      - name: Build
        working-directory: apps/frontdoor
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontdoor image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontdoor
          file: ./apps/frontdoor/Dockerfile
          load: true
          tags: med13-frontdoor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: med13-frontdoor:test
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

  deploy-dev:
    name: Deploy Frontdoor to Dev
    needs: frontdoor-checks
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontdoor image (Dev)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontdoor
          file: ./apps/frontdoor/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-frontdoor-dev:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontdoor to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-frontdoor-dev
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-frontdoor-dev:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --allow-unauthenticated

  deploy-staging:
    name: Deploy Frontdoor to Staging
    needs: frontdoor-checks
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontdoor image (Staging)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontdoor
          file: ./apps/frontdoor/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-frontdoor-staging:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontdoor to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-frontdoor-staging
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-frontdoor-staging:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --allow-unauthenticated

  deploy-production:
    name: Deploy Frontdoor to Production
    needs: frontdoor-checks
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontdoor image (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontdoor
          file: ./apps/frontdoor/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-frontdoor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontdoor to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: med13-frontdoor
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/med13-frontdoor:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --allow-unauthenticated
